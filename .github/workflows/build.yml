name: OrionOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support qemu-utils parted

      - name: Sync cores
        run: bash scripts/sync-cores.sh

      - name: Prune cores
        run: bash scripts/prune-cores.sh

      - name: Build image
        run: |
          sudo bash scripts/build.sh
        env:
          BOARD: orangepizero3
          RELEASE: bookworm

      - name: Compress
        run: bash scripts/compress.sh armbian-build/output/images/*.img

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionOS-image
          path: armbian-build/output/images/*.img.tar.xz