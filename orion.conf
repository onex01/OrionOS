# ============================================================
#  OrionOS build configuration
#  Copy this file and pass it to customize-image.sh via env:
#    ORION_CONF=/path/to/orion.conf ./customize-image.sh
# ============================================================

# ── Release ──────────────────────────────────────────────────
ORION_VERSION="0.2.0"
ORION_CODENAME="Rigel"

# ── Target hardware ──────────────────────────────────────────
ORION_BOARD="orangepizero3"
ORION_SOC="h618"
ORION_GPU="panfrost"            # panfrost | mali-blob (mali-blob = unsupported, reserved)

# ── Feature flags ────────────────────────────────────────────
ORION_ENABLE_DESKTOP="no"       # Openbox desktop mode (adds ~150 MB)
ORION_ENABLE_BROWSER="yes"      # Chromium kiosk in Ports menu
ORION_ENABLE_PORTMASTER="yes"   # PortMaster + fake oga_events
ORION_ENABLE_BLUETOOTH="yes"    # BT gamepad auto-pairing service
ORION_ENABLE_ZRAM="yes"         # zram swap (recommended, replaces SD swap)
ORION_ENABLE_OTA="yes"          # Simple rsync-based OTA updater
ORION_ENABLE_SCRAPER="no"       # Skyscraper ROM metadata (needs network at runtime)
ORION_ENABLE_THERMAL="yes"      # Thermal governor tuning + monitoring service

# ── RetroArch cores ──────────────────────────────────────────
# Space-separated list of libretro core package names to install.
# Use "all" to install every supported core.
ORION_CORES="nestopia snes9x genesis_plus_gx pcsx_rearmed mgba melonds mednafen_pce"
# ORION_CORES="all"

# ── Performance profiles ─────────────────────────────────────
# balanced | performance | powersave
# Written to /etc/orion/power-profile and applied by orion-power.service
ORION_DEFAULT_POWER_PROFILE="balanced"

# ── Storage ──────────────────────────────────────────────────
ORION_ROMS_PATH="/roms"
ORION_ROMS2_PATH="/roms2"
ORION_ZRAM_SIZE="512M"          # zram device size
ORION_ZRAM_ALGO="zstd"          # lz4 | zstd | lzo

# ── User ─────────────────────────────────────────────────────
ORION_USER="orion"
# Password is NOT stored here — first-boot wizard sets it interactively.
# Default temporary password (changed on first boot): see 00-base.sh

# ── UI ───────────────────────────────────────────────────────
ORION_ES_THEME="carbon"         # EmulationStation theme
ORION_SPLASH_TIMEOUT="5"        # Plymouth splash duration (seconds)

# ── Network ──────────────────────────────────────────────────
ORION_OTA_URL="https://github.com/onex01/OrionOS/releases/latest/download"
ORION_OTA_CHECK_URL="https://api.github.com/repos/onex01/OrionOS/releases/latest"
